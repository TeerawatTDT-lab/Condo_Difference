<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condo Price Difference Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .map-wrapper { width: 100%; height: 480px; position: relative; }
        #map { width: 100%; height: 480px; border-radius: 0.75rem; z-index: 1; }
        .table-scroll { height: 480px; max-height: 480px; overflow-y: auto; }
        .full-table-scroll { max-height: 500px; overflow-y: auto; }
        .sort-icon { opacity: 0.3; }
        th:hover .sort-icon { opacity: 1; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-6">

    <header class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h1 class="text-2xl font-bold text-slate-900"><i class="fa-solid fa-chart-line text-indigo-600"></i> Dashboard เปรียบเทียบราคาซื้อขายจดทะเบียนกับราคาประเมิน</h1>
    </header>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="filterProvince" onchange="onProvinceChange()" class="border p-2 rounded-lg"><option value="">-- ทุกจังหวัด --</option></select>
            <select id="filterBranch" onchange="onFilterChange()" class="border p-2 rounded-lg"><option value="">-- ทุกสำนักงานที่ดิน --</option></select>
            <select id="filterStatus" onchange="onFilterChange()" class="border p-2 rounded-lg"><option value="">-- ทุกสถานะ --</option><option value="ร้อยละ 30 ขึ้นไป">ร้อยละ 30 ขึ้นไป</option><option value="น้อยกว่าร้อยละ 30">น้อยกว่าร้อยละ 30</option></select>
        </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl border-l-4 border-blue-500 shadow-sm"><div class="text-sm">จำนวนอาคารชุด</div><div id="statTotalCondo" class="text-2xl font-bold">0</div></div>
        <div class="bg-white p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm"><div class="text-sm">จำนวนการซื้อขาย</div><div id="statTotalReg" class="text-2xl font-bold">0</div></div>
        <div class="bg-white p-4 rounded-xl border-l-4 border-amber-500 shadow-sm"><div class="text-sm">จำนวนห้อง</div><div id="statTotalRoom" class="text-2xl font-bold">0</div></div>
        <div class="bg-white p-4 rounded-xl border-l-4 border-emerald-500 shadow-sm"><div class="text-sm">อัตราการเปลี่ยนแปลง</div><div id="statAvgDiff" class="text-2xl font-bold">0.00%</div></div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-xl p-4"><div id="map"></div></div>
        <div class="bg-white rounded-xl p-4 table-scroll">
            <table class="w-full text-sm">
                <thead class="bg-slate-100 sticky top-0"><tr><th>จังหวัด</th><th>อาคารชุด</th><th>ความแตกต่าง</th></tr></thead>
                <tbody id="top10TableBody"></tbody>
            </table>
        </div>
    </section>

    <script>
        let rawDiffData = [];
        let allCondoData = [];
        let map, geoJsonLayer;

        async function loadData() {
            const urls = {
                diff: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrm5a3vr2Xy--fXVffx0m9nnsY2xWE3r04x0YCCp6xIrUpm62KTvGvl_1YRZ2LRo0rn6zZKMLfq20F/pub?gid=432128467&single=true&output=csv',
                allCondo: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrm5a3vr2Xy--fXVffx0m9nnsY2xWE3r04x0YCCp6xIrUpm62KTvGvl_1YRZ2LRo0rn6zZKMLfq20F/pub?gid=1402775876&single=true&output=csv'
            };
            const [resDiff, resAll] = await Promise.all([fetch(urls.diff).then(r=>r.text()), fetch(urls.allCondo).then(r=>r.text())]);
            rawDiffData = Papa.parse(resDiff, { header: true, dynamicTyping: true }).data;
            allCondoData = Papa.parse(resAll, { header: true, dynamicTyping: true }).data;
            
            initMap();
            populateFilters();
            onFilterChange();
        }

        function initMap() {
            map = L.map('map').setView([13.0, 101.5], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            fetch('https://raw.githubusercontent.com/apisit/thailand.json/master/thailand.json')
                .then(res => res.json()).then(data => { geoJsonLayer = L.geoJson(data, { style: { fillColor: '#fef0d9', weight: 1, color: '#fff', fillOpacity: 0.7 } }).addTo(map); });
        }

        function populateFilters() {
            const pSelect = document.getElementById('filterProvince');
            const provinces = [...new Set(rawDiffData.map(d => d.CHANGWAT_Name))].sort();
            provinces.forEach(p => pSelect.appendChild(new Option(p, p)));
        }

        function updateBranchDropdown() {
            const pVal = document.getElementById('filterProvince').value;
            const bSelect = document.getElementById('filterBranch');
            bSelect.innerHTML = '<option value="">-- ทุกสำนักงานที่ดิน --</option>';
            const branches = [...new Set(rawDiffData.filter(d => !pVal || d.CHANGWAT_Name === pVal).map(d => d.BRANCH_Name))].sort();
            branches.forEach(b => bSelect.appendChild(new Option(b, b)));
        }

        function onProvinceChange() { updateBranchDropdown(); onFilterChange(); }

        function onFilterChange() {
            const fDiff = rawDiffData.filter(d => (!document.getElementById('filterProvince').value || d.CHANGWAT_Name === document.getElementById('filterProvince').value) && (!document.getElementById('filterBranch').value || d.BRANCH_Name === document.getElementById('filterBranch').value) && (!document.getElementById('filterStatus').value || d.STATUS === document.getElementById('filterStatus').value));
            
            document.getElementById('statTotalCondo').textContent = allCondoData.length;
            document.getElementById('statTotalReg').textContent = fDiff.reduce((sum, d) => sum + (d.ALL_REG || 0), 0);
            document.getElementById('statTotalRoom').textContent = fDiff.reduce((sum, d) => sum + (d.ALL_ROOM || 0), 0);
            
            const highDiff = fDiff.filter(d => d.STATUS === "ร้อยละ 30 ขึ้นไป");
            document.getElementById('statAvgDiff').textContent = highDiff.length ? (highDiff.reduce((s,d)=>s+d.Percent_Diff,0)/highDiff.length).toFixed(2) + "%" : "0.00%";
            
            renderTable(fDiff);
        }

        function renderTable(data) {
            document.getElementById('top10TableBody').innerHTML = data.slice(0, 10).map(d => `<tr><td class="p-2">${d.CHANGWAT_Name}</td><td class="p-2">${d.CONDO_NAME}</td><td class="p-2 text-right font-bold">${d.Percent_Diff.toFixed(2)}%</td></tr>`).join('');
        }

        function resetFilters() { location.reload(); }

        window.onload = loadData;
    </script>
</body>
</html>
